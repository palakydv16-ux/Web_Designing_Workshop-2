<!DOCTYPE html>
<html lang="en">
<html>
<html lang="en"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body{
    margin:0;
    padding:0;
    text-align:center;
}

img{
    width:100%;
    height:100vh;
    object-fit:cover;
}

.btn_box{
    position:absolute;
    top:60%;
    left:50%;
    transform: translate(-50%, -50%);
    display:flex;
    flex-direction:column;
    align-items:center;
}

.main{
    position:relative; 
}
button{
   
    padding:10px 30px;
    margin:10px;
    font-size:16px;
    background-color:grey;
    color:white;
    border:1px solid black;
    cursor:pointer;
}

button:hover{
    background-color:darkgrey;
}
select{
    padding:10px 30px;
    margin:10px;
    font-size:16px;
    background-color:grey;
    color:white;
    border:1px solid black;
    cursor:pointer;
}
button,a,
select{
    width:100%;
}

</style>

</head>
<body>

<div class="main">
    <img src="https://e.snmc.io/lk/o/x/763e0692608c89c6a0cbd513fff6e080/7382279" alt="minecraft">

    <div class="btn_box">
         <select>
        <option  value="" disabled selected>Select Player</option>
        <option>Player 1</option>
        <option>Player 2</option>
        <option>Player 3</option>
    </select>
        <a href="start.html">
        <button>Start Game</button>
        </a>
       <a href="about.html">
       <button>About</button>
      </a>
      
    </div>
</div>

</body>
</html>
