<!DOCTYPE html>
<html lang="en">
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft World</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background-image:url("https://images3.alphacoders.com/612/thumb-1920-612611.jpg");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            height:100vh;
            color:white;
        }

        .navbar{
            background:rgba(0,0,0,0.8);
            padding:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .navbar h2{
            margin:0;
            color:#3c8527;
        }

        .navbar ul{
            list-style:none;
            display:flex;
            gap:20px;
            margin:0;
            padding:0;
        }

        .navbar ul li{
            cursor:pointer;
        }

        .navbar ul li:hover{
            color:#3c8527;
        }

        .character-section{
            text-align:center;
            margin-top:40px;
        }

        .character-section img{
            width:150px;
        }

        .tools{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:40px;
        }

        .tool-box{
            width:80px;
            height:80px;
            background:rgba(0,0,0,0.7);
            border:3px solid #3c8527;
            display:flex;
            justify-content:center;
            align-items:center;
             transition:0.2s;
        }

        .tool-box img{
            width:50px;
        }
        .tool-box:hover{
    transform: scale(1.15); 
    border:2px solid white;
}

        .inventory{
            position:absolute;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            gap:10px;
        }

   
        .slot{
    width:60px;
    height:60px;
    background:rgba(0,0,0,0.8);
    border:2px solid grey;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden; 
     transition:0.2s;
}
.slot:hover{
    transform: scale(1.15); 
    border:2px solid white;
}


.slot img{
    max-width:80%; 
    max-height:80%;
    object-fit:contain;
}


    </style>
</head>

<body>

<div class="navbar">
    <h2>Minecraft World</h2>
    <ul>
        <li> Home</li>
        <li>Inventory</li>
        <li>Crafting</li>
        <li>Settings</li>
    </ul>
</div>

<div class="character-section">
    <h3>Player: Steve</h3>
    <img src="https://w7.pngwing.com/pngs/723/188/png-transparent-minecraft-steve-minecraft-wall-decal-sticker-video-game-steve-angle-film-creeper-thumbnail.png">
</div>

<div class="tools">
    <div class="tool-box">
        <img src="https://clipart-library.com/images/qiB55Xdi5.png" alt=" pickaxe">
    </div>

    <div class="tool-box">
        <img src="https://media.forgecdn.net/avatars/392/500/637586776226648016.png"  alt="minecraft bow ">
    </div>

    <div class="tool-box">
        <img src="https://toppng.com/uploads/preview/diamond-sword-minecraft-diamond-sword-11563287797ifo5izjnse.png" alt="axe">
    </div>
</div>

<div class="inventory">
   
    <div class="slot"> <img src="https://c4k3.github.io/wiki.vg/images/1/13/Inventory-slots.png"></div>
    <div class="slot"> <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOQVwk9rY26W59-g3-FB3hG-2KkBZvyBNCYg&s"></div>
    <div class="slot"> <img src="https://preview.redd.it/6yrj9z7cvlk51.png?width=226&format=png&auto=webp&s=5dd8525c7c2a5af3b72e5b9fe5c0cab1473dd75d"></div>
    <div class="slot"> <img src="https://preview.redd.it/some-new-icons-and-gui-for-my-resource-pack-v0-sb1bb8gik89a1.png?width=600&format=png&auto=webp&s=a2527b527b0fb66c27b7852d7390c59cfe0792a5"></div>
    <div class="slot"> <img src="https://i.pinimg.com/564x/72/b2/b1/72b2b1038558e950e35ee165dbc56e22.jpg"></div>
    <div class="slot"> <img src="https://i.pinimg.com/474x/aa/de/5c/aade5c869ff15a022d7f06a1e0991820.jpg"></div>
    <div class="slot"> <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYnWxUTwF95JEhKlTSXGqM8i2L7_mCtcMluQ&s"></div>
</div>

</body>
</html>
