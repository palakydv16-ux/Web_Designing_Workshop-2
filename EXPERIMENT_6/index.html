<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Lab</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="page">

<div class="box">

    <h1 id="heading">Welcome to JavaScript Lab</h1>

    <input type="text" id="newHeading" placeholder="Enter new text">

    <div class="btn-group">
        <button onclick="changeHeading()">Change Heading</button>
        <button onclick="changeColor()">Change Background</button>

        <button onclick="increaseFont()">Increase Font Size</button>
        <button onclick="decreaseFont()">Decrease Font Size</button>

        <button onclick="changeFontColor()">Change Font Color</button>
        <button onclick="togglePara()">Show/Hide Paragraph</button>

        <button class="reset" onclick="resetPage()">Reset</button>
    </div>

    <p id="demo">
        This is a sample paragraph. Click the buttons to see the changes.
    </p>

</div>

<script src="script.js"></script>

</body>
</html>
