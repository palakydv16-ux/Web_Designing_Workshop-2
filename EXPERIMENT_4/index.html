<!DOCTYPE html>
<html>
<head>
<title>Student Result Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="box">
        <h2>Student Result Calculator</h2>

        <label>Enter Number of Subjects:</label>
        <input type="number" id="subjects" placeholder="Enter subjects">

        <button onclick="calculate()">Calculate Result</button>

        <p id="total"></p>
        <p id="percentage"></p>
        <p id="grade"></p>
        <p id="result"></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
